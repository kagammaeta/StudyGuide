<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIN4424 — Final Exam Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --paper: #f5f1e8;
    --paper-2: #ebe4d2;
    --ink: #1a1a1a;
    --ink-soft: #3d3a32;
    --muted: #6b6557;
    --line: #d4cdb8;
    --line-soft: #e3dcc8;
    --accent: #8b2e1f;     /* deep brick red — for "important" */
    --accent-soft: #c5462f;
    --gold: #a67c2e;       /* for "memorize" */
    --green: #3d6b42;      /* correct */
    --red: #a83232;        /* wrong */
    --blue: #2a5275;       /* math tag */
    --plum: #5a3a6b;       /* concept tag */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139,46,31,0.04), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(166,124,46,0.04), transparent 40%);
    min-height: 100vh;
  }
  h1, h2, h3, h4 { font-family: 'Fraunces', Georgia, serif; font-weight: 600; letter-spacing: -0.01em; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }

  /* ---- Layout ---- */
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
  header.top {
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px; margin-bottom: 28px;
    display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px;
  }
  header.top h1 { margin: 0; font-size: 32px; line-height: 1.1; font-weight: 600; }
  header.top .sub { color: var(--muted); font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }
  header.top .meta { font-size: 12px; color: var(--muted); text-align: right; font-style: italic; }

  /* ---- Tabs ---- */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .tab {
    padding: 12px 22px; font-size: 14px; font-weight: 500; letter-spacing: 0.02em;
    color: var(--muted); position: relative; transition: color .15s;
    border-bottom: 2px solid transparent;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 600; }
  .tab .count { font-size: 11px; color: var(--muted); margin-left: 6px; font-weight: 400; }

  /* ---- Search & filters ---- */
  .toolbar {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    margin-bottom: 20px;
  }
  .search-box {
    flex: 1; min-width: 240px;
    background: white; border: 1px solid var(--line); border-radius: 4px;
    padding: 10px 14px; font-size: 14px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,46,31,0.08); }
  .filter-pill {
    padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    background: white; transition: all .15s;
  }
  .filter-pill:hover { border-color: var(--ink-soft); color: var(--ink); }
  .filter-pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ---- Cards ---- */
  .card {
    background: white; border: 1px solid var(--line); border-radius: 6px;
    margin-bottom: 14px; overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover { border-color: var(--ink-soft); }
  .card-head {
    padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
    cursor: pointer; user-select: none;
  }
  .card-head:hover { background: rgba(0,0,0,0.015); }
  .card-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; color: var(--ink); margin: 0; line-height: 1.3; }
  .card-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
  .badge {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 3px; background: var(--paper-2); color: var(--ink-soft);
  }
  .badge.unit-1 { background: #e8d8c4; color: #6b4a25; }
  .badge.unit-2 { background: #d4dfe5; color: #2a5275; }
  .badge.unit-3 { background: #e0d5e3; color: #5a3a6b; }
  .badge.important { background: var(--accent); color: white; }
  .badge.diff-Easy { background: #d4e3d4; color: #2d5b32; }
  .badge.diff-Medium { background: #e8dcc4; color: #7a5a1a; }
  .badge.diff-Hard { background: #e8c8c4; color: #8a3025; }
  .badge.type-math { background: #d4dfe5; color: var(--blue); }
  .badge.type-conceptual { background: #e0d5e3; color: var(--plum); }
  .chev { font-size: 18px; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .chev.open { transform: rotate(90deg); }
  .card-body { padding: 4px 20px 20px; border-top: 1px solid var(--line-soft); }

  /* ---- Formula box ---- */
  .formula-box {
    background: var(--paper-2); border-left: 3px solid var(--accent);
    padding: 14px 18px; margin: 14px 0; border-radius: 0 4px 4px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500;
    color: var(--ink);
  }

  /* ---- Section in card ---- */
  .sec { margin-top: 14px; }
  .sec-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .sec-content { font-size: 14px; color: var(--ink-soft); }
  .sec-content ul, .sec-content ol { margin: 4px 0; padding-left: 20px; }
  .sec-content li { margin-bottom: 4px; }
  .sec-content code { background: var(--paper-2); padding: 1px 5px; border-radius: 3px; font-size: 13px; }

  .var-row { display: flex; gap: 12px; padding: 6px 0; border-bottom: 1px dashed var(--line-soft); }
  .var-row:last-child { border-bottom: none; }
  .var-key { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent); min-width: 50px; flex-shrink: 0; }

  .mistake-box {
    background: #faf3f0; border-left: 3px solid var(--accent-soft);
    padding: 10px 14px; margin: 8px 0; border-radius: 0 4px 4px 0; font-size: 13.5px; color: #6b3025;
  }
  .example-box {
    background: #f4ede0; border: 1px solid var(--line); border-radius: 4px;
    padding: 12px 16px; margin: 10px 0; font-size: 13.5px;
  }
  .memorize-box {
    background: #f7eed9; border: 1px solid var(--gold); border-left: 4px solid var(--gold);
    padding: 12px 16px; margin: 10px 0; border-radius: 0 4px 4px 0;
  }
  .memorize-box .sec-label { color: var(--gold); }

  /* ---- Section headers (within tabs) ---- */
  .section-h {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600;
    margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; gap: 10px;
  }
  .section-h .ornament { color: var(--accent); font-size: 16px; }
  .section-intro { color: var(--muted); font-size: 13px; margin-bottom: 14px; font-style: italic; }

  /* ---- Decision Guide ---- */
  .decision-guide {
    background: linear-gradient(135deg, #fff 0%, #faf6ec 100%);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 20px 24px; margin-bottom: 20px;
  }
  .decision-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    padding: 10px 0; border-bottom: 1px dashed var(--line-soft); align-items: start;
  }
  .decision-row:last-child { border-bottom: none; }
  .decision-q { font-weight: 500; color: var(--ink); font-size: 13.5px; }
  .decision-a { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); font-weight: 500; }

  /* ---- Quiz ---- */
  .quiz-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .stat-card {
    background: white; border: 1px solid var(--line); border-radius: 6px;
    padding: 16px 18px;
  }
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--ink); }
  .stat-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .quiz-controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    padding: 14px 0; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft);
    margin-bottom: 20px;
  }
  .btn {
    padding: 8px 16px; border: 1px solid var(--line); background: white; border-radius: 4px;
    font-size: 13px; font-weight: 500; color: var(--ink-soft); transition: all .15s;
  }
  .btn:hover { border-color: var(--ink); color: var(--ink); }
  .btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.danger { color: var(--red); border-color: var(--red); }
  .btn.danger:hover { background: var(--red); color: white; }

  .question-card {
    background: white; border: 1px solid var(--line); border-radius: 8px;
    padding: 28px 32px; margin-bottom: 16px;
  }
  .question-num { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; }
  .question-text {
    font-family: 'Fraunces', serif; font-size: 19px; line-height: 1.45;
    margin: 10px 0 20px; color: var(--ink);
  }
  .choice {
    display: block; width: 100%; text-align: left;
    padding: 12px 16px; margin-bottom: 8px; border: 1.5px solid var(--line);
    border-radius: 5px; background: white; font-size: 14px;
    transition: all .12s; cursor: pointer;
  }
  .choice:hover:not(.locked):not(.selected) { border-color: var(--ink-soft); background: var(--paper); }
  .choice.selected { border-color: var(--ink); background: var(--paper-2); }
  .choice.correct { border-color: var(--green); background: #e7f0e7; color: #1f3d22; }
  .choice.wrong { border-color: var(--red); background: #f5e3e1; color: #6b1f1f; }
  .choice .letter { font-family: 'JetBrains Mono', monospace; font-weight: 600; margin-right: 10px; color: var(--muted); }
  .choice.correct .letter, .choice.wrong .letter { color: inherit; }

  .feedback {
    margin-top: 18px; padding: 16px 20px; border-radius: 5px;
    border-left: 3px solid var(--accent); background: var(--paper-2);
    font-size: 14px; line-height: 1.6;
  }
  .feedback.correct { border-left-color: var(--green); background: #eef5ee; }
  .feedback.wrong { border-left-color: var(--red); background: #f8ece9; }
  .feedback-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .feedback.correct .feedback-label { color: var(--green); }
  .feedback.wrong .feedback-label { color: var(--red); }

  .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 18px; }

  /* ---- Cram view ---- */
  .cram { background: white; border: 1px solid var(--line); border-radius: 6px; padding: 28px; }
  .cram h3 { margin-top: 24px; margin-bottom: 8px; font-size: 16px; }
  .cram h3:first-child { margin-top: 0; }
  .cram ul { padding-left: 20px; margin: 6px 0; }
  .cram li { margin-bottom: 4px; font-size: 13.5px; }

  /* ---- Empty state ---- */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-style: italic; }

  /* ---- Mobile ---- */
  @media (max-width: 700px) {
    .wrap { padding: 20px 14px 60px; }
    header.top h1 { font-size: 24px; }
    .tab { padding: 10px 14px; font-size: 13px; }
    .question-card { padding: 20px; }
    .question-text { font-size: 17px; }
    .decision-row { grid-template-columns: 1fr; gap: 4px; }
    .decision-a { padding-left: 12px; }
  }
</style>
</head>

<script>
/* === DATA INJECTED HERE === */
// ============================================================
// FIN4424 Final Exam Study Data
// Source: Final Review Transcript, Exam 3 Guide, Formula Sheet,
//   Extra Practice Problems, Sterling Cooper, Exam 3 Review PPT
// ============================================================

// ---------- FORMULAS ----------
const FORMULAS = [
  {
    id: "constgrowth",
    name: "Constant Growth Model (Gordon Growth)",
    chapter: "Ch 7",
    unit: 1,
    important: true,
    formula: "P₀ = D₁ / (rₛ − g)",
    used_for: "Valuing a stock that pays dividends growing at a CONSTANT rate forever.",
    plain: "Today's stock price = next year's dividend divided by (required return minus growth rate). The bigger the gap between rₛ and g, the lower the price.",
    variables: [
      { v: "P₀", meaning: "Stock price today (you can also solve for P₁, P₂, P₃ — just shift the dividend subscript: P₃ = D₄/(rₛ−g))" },
      { v: "D₁", meaning: "Dividend at end of year 1. If you're given D₀ (last dividend), multiply by (1+g): D₁ = D₀(1+g)" },
      { v: "rₛ", meaning: "Required return / cost of equity. Often given. If not, compute with CAPM: Rf + β(Rm − Rf)" },
      { v: "g", meaning: "Constant dividend growth rate. Must be less than rₛ or the formula breaks." },
    ],
    steps: [
      "1. Confirm dividends grow at a CONSTANT rate forever. If not, this formula alone won't work.",
      "2. Find D₁. If only D₀ given, multiply by (1+g).",
      "3. Make sure rₛ > g.",
      "4. Plug in: P₀ = D₁ / (rₛ − g).",
      "5. To find P at a future year n: Pₙ = Dₙ₊₁ / (rₛ − g)."
    ],
    mistakes: [
      "Using D₀ instead of D₁ in the numerator.",
      "Confusing 'last dividend paid' (D₀) with 'next dividend' (D₁).",
      "Trying to use this when growth is non-constant — you need the multi-stage model.",
      "Mixing percentages and decimals (use decimals: 5% = 0.05)."
    ],
    example: {
      problem: "D₁ = $0.75, rₛ = 10.5%, g = 6.4%. Find P₀ and P₃.",
      solution: "P₀ = 0.75 / (0.105 − 0.064) = 0.75 / 0.041 = $18.29.\nP₃ = D₄/(rₛ−g) = 0.75(1.064)³/0.041 = $22.03.\n(Or just: P₃ = P₀ × (1+g)³ = 18.29 × 1.064³ = $22.03 — same answer because P grows at g.)"
    },
    when: "Use anytime you see 'constant growth', 'grows at X% forever', or 'perpetual dividend growth'. Also for terminal value in DCF when 'stable growth model' is mentioned.",
    recognize: "Keywords: 'constant growth', 'forever', 'perpetuity'. Single growth rate given. Dividend or FCF that grows at one steady rate."
  },
  {
    id: "nonconstgrowth",
    name: "Non-Constant Dividend Growth (Multi-Stage)",
    chapter: "Ch 7",
    unit: 1,
    important: true,
    formula: "P₀ = Σ Dₜ/(1+rₛ)ᵗ + Pₙ/(1+rₛ)ⁿ, where Pₙ = Dₙ₊₁/(rₛ−g_constant)",
    used_for: "Valuing a stock when dividends grow at different rates before settling into a constant rate.",
    plain: "Forecast each dividend year-by-year until growth becomes constant. Then use the constant-growth model to compute a 'terminal' price at that year. Discount everything back to today.",
    variables: [
      { v: "Dₜ", meaning: "Dividend in each year of the non-constant phase" },
      { v: "Pₙ", meaning: "Terminal price at end of year n (the LAST non-constant year). It values ALL dividends from year n+1 onward." },
      { v: "Dₙ₊₁", meaning: "First dividend in the constant-growth phase = Dₙ × (1 + g_constant)" },
      { v: "rₛ", meaning: "Required return / cost of equity" },
      { v: "g_constant", meaning: "The long-run constant growth rate" }
    ],
    steps: [
      "1. Compute each dividend year-by-year through the last non-constant year.",
      "2. Compute Dₙ₊₁ = Dₙ × (1 + g_constant).",
      "3. Compute Pₙ = Dₙ₊₁ / (rₛ − g_constant).",
      "4. Discount each Dₜ AND Pₙ back to today using rₛ.",
      "5. Sum everything = P₀."
    ],
    mistakes: [
      "Discounting Pₙ by the wrong number of years. Pₙ is at year n, so divide by (1+rₛ)ⁿ — NOT (1+rₛ)ⁿ⁺¹.",
      "Forgetting to grow the dividend one more time when computing Dₙ₊₁ (the first 'constant' dividend).",
      "Stopping too early: keep computing dividends until growth turns constant."
    ],
    example: {
      problem: "D₀ = $1.75, g = 25% for 2 years then 6% forever, rₛ = 12%. Find P₀.",
      solution: "D₁ = 1.75(1.25) = 2.1875\nD₂ = 2.1875(1.25) = 2.7344\nD₃ = 2.7344(1.06) = 2.8984\nP₂ = D₃/(rₛ−g) = 2.8984/(0.12−0.06) = 48.31\nP₀ = 2.1875/1.12 + 2.7344/1.12² + 48.31/1.12² = 1.953 + 2.180 + 38.51 = $42.64"
    },
    when: "When the problem gives multiple growth rates over different periods OR says 'grows at X% for N years, then Y% forever'.",
    recognize: "Keywords: 'for the next N years', 'after which', 'then grows at', 'high growth then stable'. Two or more growth rates."
  },
  {
    id: "npv",
    name: "Net Present Value (NPV)",
    chapter: "Ch 10",
    unit: 1,
    important: true,
    formula: "NPV = Σ CFₜ/(1+r)ᵗ  for t = 0 to N",
    used_for: "Evaluating whether a project creates or destroys value. THE preferred method for capital budgeting.",
    plain: "Add up all future cash flows discounted to today, then subtract the initial investment. If positive, project creates value — accept.",
    variables: [
      { v: "CFₜ", meaning: "Cash flow in year t. CF₀ is usually negative (initial investment)." },
      { v: "r", meaning: "Discount rate (typically WACC for whole-firm projects)" },
      { v: "N", meaning: "Final year of the project" }
    ],
    steps: [
      "1. List every cash flow including year 0.",
      "2. In Excel: =NPV(r, year1_cashflow:yearN_cashflow) + year0_cashflow. Year 0 is added separately because Excel's NPV assumes the first CF is at year 1.",
      "3. Decision rule: NPV > 0 → ACCEPT. NPV < 0 → REJECT."
    ],
    mistakes: [
      "Including year 0 inside the Excel NPV() function — Excel's NPV starts at year 1. Add CF₀ separately.",
      "Using cost of equity instead of WACC when project affects the whole firm.",
      "Forgetting that NPV is in TODAY'S dollars."
    ],
    example: {
      problem: "CFs = [−1000, 400, 300, 250, 200, 150], r = 10%. NPV?",
      solution: "Excel: =NPV(0.10, 400:150) + (−1000) = 1029.14 − 1000 = $29.14.\nPositive → accept."
    },
    when: "Almost always the first method to use for any capital budgeting problem. Tells the TRUE value created or destroyed.",
    recognize: "Cash flow stream + discount rate. 'Should the firm accept this project?' 'What is the value added?'"
  },
  {
    id: "irr",
    name: "Internal Rate of Return (IRR)",
    chapter: "Ch 10",
    unit: 1,
    important: true,
    formula: "0 = Σ CFₜ/(1+IRR)ᵗ",
    used_for: "Finding the discount rate that makes NPV = 0. Compare to required return to make accept/reject.",
    plain: "The break-even discount rate. If the project's IRR beats your required return (WACC), the project creates value.",
    variables: [
      { v: "CFₜ", meaning: "Cash flow in year t (include year 0)" },
      { v: "IRR", meaning: "The unknown rate the formula solves for" }
    ],
    steps: [
      "1. In Excel: =IRR(year0_cashflow:yearN_cashflow). Include year 0.",
      "2. Compare IRR to discount rate (WACC).",
      "3. Decision: IRR > r → accept. IRR < r → reject."
    ],
    mistakes: [
      "Using IRR with NON-CONVENTIONAL cash flows (sign changes more than once). Multiple IRRs possible — use NPV or MIRR instead.",
      "Using IRR to compare mutually exclusive projects with different sizes — wrong, use NPV.",
      "Forgetting IRR's reinvestment assumption: it assumes you can reinvest cash flows at IRR (often unrealistic — that's why MIRR exists)."
    ],
    example: {
      problem: "CFs = [−1000, 400, 300, 250, 200, 150]. IRR?",
      solution: "Excel: =IRR(−1000:150) = 11.35%. If WACC < 11.35% → accept."
    },
    when: "Conventional cash flows (one sign change) and you want a percentage return.",
    recognize: "'What return does the project earn?' 'At what discount rate does NPV = 0?'",
    drawbacks: "Four issues: (1) Can't tell lender vs. borrower (sign of CFs matters). (2) Fails for mutually exclusive projects of different sizes. (3) Reinvestment assumption is unrealistic. (4) Multiple IRRs with non-conventional cash flows."
  },
  {
    id: "mirr",
    name: "Modified Internal Rate of Return (MIRR)",
    chapter: "Ch 10",
    unit: 1,
    important: true,
    formula: "MIRR found via Excel: =MIRR(cashflows, finance_rate, reinvest_rate). Both rates = WACC for the most conservative assumption.",
    used_for: "A better IRR. Fixes the unrealistic reinvestment assumption. Works with non-conventional cash flows.",
    plain: "Compounds inflows forward at the reinvestment rate, discounts outflows back at the finance rate, then computes the rate that links the PV outflows to the FV inflows.",
    variables: [
      { v: "finance_rate", meaning: "Rate to discount cash OUTFLOWS back to today. Use WACC." },
      { v: "reinvest_rate", meaning: "Rate to compound cash INFLOWS forward. Use WACC." },
      { v: "Both = WACC", meaning: "Most conservative assumption — what the professor wants on this exam." }
    ],
    steps: [

function CramSheet() {
  return (
    <div className="cram">
      <h3>★ The One Thing</h3>
      <p style={{margin: 0}}>The primary objective of financial management is to <b>maximize the value of the firm</b> (which equals maximizing shareholder wealth, which equals maximizing the stock price). This is the extra credit question — guaranteed.</p>

      <h3>Unit 1 — Valuation, Capital Budgeting, OCF</h3>
      <ul>
        <li><b>Stock value</b> = PV of all expected future dividends. Constant growth: P₀ = D₁/(rₛ−g).</li>
        <li><b>Decision rules:</b> Accept if NPV {">"}0, IRR {">"} WACC, MIRR {">"} WACC, PI {">"} 1, Payback {"<"} cutoff.</li>
        <li><b>NPV is king.</b> When IRR conflicts with NPV (mutually exclusive), pick NPV.</li>
        <li><b>EAA</b> for projects with different lives.</li>
        <li><b>OCF</b> = (Sales − Costs)(1−T) + Dep·T. Don't double-count depreciation.</li>
        <li><b>Incremental CF only.</b> Ignore sunk costs. Include opportunity costs and side effects.</li>
        <li><b>ATSV trap:</b> ATSV = Salvage − T(Salvage − BV). NOT Gain − Tax. This is the most-missed problem.</li>
        <li><b>NWC</b> in at start, recovered at end.</li>
      </ul>

      <h3>Unit 2 — Risk, CAPM, WACC</h3>
      <ul>
        <li><b>Three risks:</b> stand-alone (total), market (β, undiversifiable), corporate (firm-level).</li>
        <li><b>CAPM:</b> r = Rf + β(Rm − Rf). β = covariance with market / market variance.</li>
        <li><b>SML</b> graphs CAPM. Above SML = undervalued; below = overvalued.</li>
        <li><b>WACC</b> = wd·rd(1−T) + wp·rp + ws·rs. Weights from MARKET values.</li>
        <li><b>Tax shield:</b> Only debt gets multiplied by (1−T). Preferred dividends are NOT tax-deductible.</li>
        <li><b>Flotation costs</b> raise the cost of new equity.</li>
      </ul>

      <h3>Unit 3 — Capital Structure, Governance, IPO/M&A</h3>
      <ul>
        <li><b>M&M I (no taxes):</b> capital structure is irrelevant. With taxes: more debt = more value (tax shield).</li>
        <li><b>Trade-off theory:</b> debt benefits (tax shield) vs costs (financial distress, bankruptcy). Optimal D/E exists.</li>
        <li><b>Levered β:</b> βL = βU·[1 + (1−T)(D/E)]. More debt → higher β → higher cost of equity.</li>
        <li><b>Recap steps:</b> (1) new D/E → new βL → new rs, (2) new WACC, (3) new EV = FCF/(WACC−g), (4) new equity = EV − new debt, (5) shares repurchased = new debt / price, (6) new price.</li>
        <li><b>Signaling:</b> debt issuance = good news (firm is confident); equity issuance = bad news (overvalued).</li>
        <li><b>Pecking order:</b> internal funds → debt → equity (last resort).</li>
        <li><b>Governance:</b> board independence, exec comp, ownership structure, takeover threats, monitoring.</li>
        <li><b>IPO:</b> primary (firm raises cash) vs secondary (insiders sell). Underwriting spread, lockup, underpricing.</li>
        <li><b>M&A motives:</b> synergy (operational + financial), tax, diversification (poor reason), agency.</li>
      </ul>

      <h3>Don't Forget</h3>
      <ul>
        <li>Read every word. "After-tax" vs "pre-tax" matters. "Required return" ≠ "expected return".</li>
        <li>Show units. Dollars vs percent. Annual vs monthly.</li>
        <li>Round only at the end. Carry 4+ decimals.</li>
        <li>If WACC is in the problem and you're discounting firm cash flows, use WACC. If discounting equity cash flows, use rs.</li>
      </ul>
    </div>
  );

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function QuizTab() {
  const [filter, setFilter] = useState("all");      // all | math | conceptual
  const [unitFilter, setUnitFilter] = useState("all");
  const [diffFilter, setDiffFilter] = useState("all");
  const [order, setOrder] = useState("sequential"); // sequential | random
  const [showOnlyMissed, setShowOnlyMissed] = useState(false);
  const [answers, setAnswers] = useState({});       // id -> selected idx
  const [revealed, setRevealed] = useState({});     // id -> bool (revealed without picking)
  const [seed, setSeed] = useState(0);
  const [idx, setIdx] = useState(0);

  const pool = useMemo(() => {
    let pool = QUESTIONS.filter(q => {
      if (filter !== "all" && q.type !== filter) return false;
      if (unitFilter !== "all" && q.unit !== unitFilter) return false;
      if (diffFilter !== "all" && q.difficulty !== diffFilter) return false;
      if (showOnlyMissed) {
        const a = answers[q.id];
        if (a === undefined || a === q.correct) return false;
      }
      return true;
    });
    if (order === "random") pool = shuffleArray(pool);
    return pool;
    // eslint-disable-next-line
  }, [filter, unitFilter, diffFilter, showOnlyMissed, order, seed]);

  // Keep idx in range
  useEffect(() => { if (idx >= pool.length) setIdx(0); }, [pool.length, idx]);

  const q = pool[idx];

  // Stats over the pool we're currently working
  const stats = useMemo(() => {
    const total = QUESTIONS.length;
    const mathTotal = QUESTIONS.filter(x => x.type === "math").length;
    const conceptTotal = QUESTIONS.filter(x => x.type === "conceptual").length;

    let mathRight = 0, mathAns = 0, conceptRight = 0, conceptAns = 0;
    for (const x of QUESTIONS) {
      const a = answers[x.id];
      if (a === undefined) continue;
      if (x.type === "math") { mathAns++; if (a === x.correct) mathRight++; }
      else { conceptAns++; if (a === x.correct) conceptRight++; }
    }
    const totalAns = mathAns + conceptAns;
    const totalRight = mathRight + conceptRight;
    return { total, mathTotal, conceptTotal, mathAns, mathRight, conceptAns, conceptRight, totalAns, totalRight };
  }, [answers]);

  function pick(i) {
    if (!q) return;
    if (answers[q.id] !== undefined) return; // locked
    setAnswers({ ...answers, [q.id]: i });
  }
  function reveal() {
    if (!q) return;
    if (answers[q.id] !== undefined) return;
    setRevealed({ ...revealed, [q.id]: true });
  }
  function next() { if (idx < pool.length - 1) setIdx(idx + 1); }
  function prev() { if (idx > 0) setIdx(idx - 1); }
  function resetAll() {
    if (confirm("Wipe all your answers? This can't be undone.")) {
      setAnswers({}); setRevealed({}); setIdx(0);
    }
  }
  function reshuffle() { setSeed(seed + 1); setIdx(0); }

  const selected = q ? answers[q.id] : undefined;
  const isAnswered = selected !== undefined;
  const isRevealed = q ? !!revealed[q.id] : false;

  return (
    <div>
      <div className="quiz-stats">
        <div className="stat-card">
          <div className="stat-label">Overall</div>
          <div className="stat-value">{stats.totalRight}<span style={{color:'var(--muted)', fontSize:18}}>/{stats.totalAns || 0}</span></div>
          <div className="stat-detail">{stats.totalAns ? Math.round(100 * stats.totalRight / stats.totalAns) : 0}% correct · {stats.totalAns}/{stats.total} answered</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Math / Calculation</div>
          <div className="stat-value" style={{color:'var(--blue)'}}>{stats.mathRight}<span style={{color:'var(--muted)', fontSize:18}}>/{stats.mathAns || 0}</span></div>
          <div className="stat-detail">{stats.mathAns ? Math.round(100 * stats.mathRight / stats.mathAns) : 0}% · {stats.mathAns}/{stats.mathTotal} answered</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Conceptual</div>
          <div className="stat-value" style={{color:'var(--plum)'}}>{stats.conceptRight}<span style={{color:'var(--muted)', fontSize:18}}>/{stats.conceptAns || 0}</span></div>
          <div className="stat-detail">{stats.conceptAns ? Math.round(100 * stats.conceptRight / stats.conceptAns) : 0}% · {stats.conceptAns}/{stats.conceptTotal} answered</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Pool / Position</div>
          <div className="stat-value">{pool.length ? idx + 1 : 0}<span style={{color:'var(--muted)', fontSize:18}}>/{pool.length}</span></div>
          <div className="stat-detail">in current filter</div>
        </div>
      </div>

      <div className="toolbar">
        <button className={classNames("filter-pill", filter === "all" && "active")} onClick={() => { setFilter("all"); setIdx(0); }}>All Types</button>
        <button className={classNames("filter-pill", filter === "math" && "active")} onClick={() => { setFilter("math"); setIdx(0); }}>Math Only</button>
        <button className={classNames("filter-pill", filter === "conceptual" && "active")} onClick={() => { setFilter("conceptual"); setIdx(0); }}>Conceptual Only</button>
        <span style={{borderLeft: '1px solid var(--line)', height: 22, margin: '0 4px'}}></span>
        <button className={classNames("filter-pill", unitFilter === "all" && "active")} onClick={() => { setUnitFilter("all"); setIdx(0); }}>All Units</button>
        <button className={classNames("filter-pill", unitFilter === 1 && "active")} onClick={() => { setUnitFilter(1); setIdx(0); }}>U1</button>
        <button className={classNames("filter-pill", unitFilter === 2 && "active")} onClick={() => { setUnitFilter(2); setIdx(0); }}>U2</button>
        <button className={classNames("filter-pill", unitFilter === 3 && "active")} onClick={() => { setUnitFilter(3); setIdx(0); }}>U3</button>
        <span style={{borderLeft: '1px solid var(--line)', height: 22, margin: '0 4px'}}></span>
        <button className={classNames("filter-pill", diffFilter === "all" && "active")} onClick={() => { setDiffFilter("all"); setIdx(0); }}>All Levels</button>
        <button className={classNames("filter-pill", diffFilter === "Easy" && "active")} onClick={() => { setDiffFilter("Easy"); setIdx(0); }}>Easy</button>
        <button className={classNames("filter-pill", diffFilter === "Medium" && "active")} onClick={() => { setDiffFilter("Medium"); setIdx(0); }}>Medium</button>
        <button className={classNames("filter-pill", diffFilter === "Hard" && "active")} onClick={() => { setDiffFilter("Hard"); setIdx(0); }}>Hard</button>
      </div>

      <div className="quiz-controls">
        <button className="btn" onClick={reshuffle}>{order === "random" ? "↻ Reshuffle" : "🎲 Randomize"}</button>
        <button className="btn" onClick={() => { setOrder(order === "random" ? "sequential" : "random"); setIdx(0); }}>
          Order: {order === "random" ? "Random" : "Sequential"}
        </button>
        <button className={classNames("btn", showOnlyMissed && "primary")} onClick={() => { setShowOnlyMissed(!showOnlyMissed); setIdx(0); }}>
          {showOnlyMissed ? "✓ Showing Missed Only" : "Show Missed Only"}
        </button>
        <div style={{flex:1}}></div>
        <button className="btn danger" onClick={resetAll}>Reset Score</button>
      </div>

      {!q ? (
        <div className="empty">No questions match. {showOnlyMissed && "Either you haven't missed any yet (good) or your filter is empty."}</div>
      ) : (
        <div className="question-card">
          <div className="question-num">
            Question {idx + 1} of {pool.length}
            <span style={{margin: '0 8px', color:'var(--line)'}}>·</span>
            <span className={"badge type-" + q.type} style={{marginRight: 4}}>{q.type === "math" ? "Math" : "Conceptual"}</span>
            <span className={"badge unit-" + q.unit}>{q.chapter}</span>
            <span className={"badge diff-" + q.difficulty} style={{marginLeft: 4}}>{q.difficulty}</span>
          </div>
          <div className="question-text">{q.q}</div>
          {q.choices.map((choice, i) => {
            let cls = "choice";
            if (isAnswered || isRevealed) {
              cls += " locked";
              if (i === q.correct) cls += " correct";
              else if (i === selected) cls += " wrong";
            } else if (selected === i) {
              cls += " selected";
            }
            const letter = String.fromCharCode(65 + i);
            return (
              <button key={i} className={cls} onClick={() => pick(i)}>
                <span className="letter">{letter}.</span>{choice}
              </button>
            );
          })}

          {(isAnswered || isRevealed) && (
            <div className={classNames("feedback", isAnswered && (selected === q.correct ? "correct" : "wrong"))}>
              <div className="feedback-label">
                {isAnswered ? (selected === q.correct ? "✓ Correct" : "✗ Wrong") : "Answer Revealed"}
                <span style={{fontWeight:400, textTransform:'none', letterSpacing:0, marginLeft:8, color:'var(--muted)'}}>
                  · Correct answer: {String.fromCharCode(65 + q.correct)}
                </span>
              </div>
              {q.explain}
            </div>
          )}

          <div className="nav-row">
            <button className="btn" onClick={prev} disabled={idx === 0} style={{opacity: idx === 0 ? 0.4 : 1}}>← Previous</button>
            {!isAnswered && !isRevealed && <button className="btn" onClick={reveal}>Reveal Answer</button>}
            <button className="btn primary" onClick={next} disabled={idx >= pool.length - 1} style={{opacity: idx >= pool.length - 1 ? 0.4 : 1}}>Next →</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App() {
  const [tab, setTab] = useState("formulas");
  const counts = {
    formulas: FORMULAS.length,
    concepts: CONCEPTS.length,
    questions: QUESTIONS.length,
  };
  return (
    <div className="wrap">
      <Header />
      <Tabs active={tab} setActive={setTab} counts={counts} />
      {tab === "formulas" && <FormulasTab />}
      {tab === "concepts" && <ConceptsTab />}
      {tab === "quiz" && <QuizTab />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
